# Dendrite Matrix Homeserver Configuration
# For development environment - localhost mode
version: 2

global:
  # Domain name of this homeserver
  server_name: localhost

  # Path to the signing private key (generated by Dendrite on first run)
  private_key: matrix_key.pem

  # PostgreSQL database connection
  database:
    connection_string: postgresql://dendrite:itsasecret@matrix-postgres/dendrite?sslmode=disable
    max_open_conns: 90
    max_idle_conns: 5
    conn_max_lifetime: -1

  # In-memory cache configuration
  cache:
    max_size_estimated: 1gb
    max_age: 1h

  # Disable federation for localhost development
  # This prevents Dendrite from connecting to other Matrix servers
  disable_federation: true

  # Presence configuration
  presence:
    enable_inbound: false
    enable_outbound: false

# Client API configuration
client_api:
  # Open registration - allow anyone to register
  registration_disabled: true
  guests_disabled: true

  # Registration shared secret (used for admin registration)
  # In production, generate a secure random string
  registration_shared_secret: "dev-secret-change-in-production"

  # reCAPTCHA disabled for local development
  enable_registration_captcha: false
  recaptcha_public_key: ""
  recaptcha_private_key: ""

  # TURN server configuration (VoIP support)
  # Leave empty if not using TURN
  turn:
    turn_user_lifetime: "5m"
    turn_uris: []
    turn_shared_secret: ""

  # Rate limiting for API protection
  rate_limiting:
    enabled: true
    threshold: 20
    cooloff_ms: 500

# Federation API configuration
federation_api:
  # Disabled for localhost development
  enabled: false

  # List of allowed federation servers (empty = none)
  servers: []

# Media API configuration
media_api:
  base_path: ./media_store
  max_file_size_bytes: 10485760  # 10MB
  dynamic_thumbnails: false

# Sync API configuration
sync_api:
  max_limit: 100
  max_timeout: 30000
  purge_history: true
  purge_age: 168h  # 7 days