# Matrix Stack - Dendrite Homeserver + Element Web
# 
# Usage:
#   ./start.sh    - Generate configs and start services
#   ./stop.sh     - Stop services
#   docker-compose logs - View logs
#
# DO NOT run docker-compose up directly - use start.sh instead

services:
  # Matrix database
  matrix-postgres:
    image: postgres:15-alpine
    container_name: matrix-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dendrite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-dendrite}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - matrix-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dendrite}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Dendrite Homeserver
  dendrite:
    image: matrixdotorg/dendrite-monolith:latest
    container_name: matrix-dendrite
    ports:
      - "${DENDRITE_HTTP_PORT:-8008}:8008"
      - "${DENDRITE_HTTPS_PORT:-8448}:8448"
    volumes:
      - ./config:/etc/dendrite
      - ./data/media:/var/dendrite/media
      - ./data/jetstream:/var/dendrite/jetstream
    networks:
      - matrix-net
    depends_on:
      matrix-postgres:
        condition: service_healthy
    restart: unless-stopped

  # Element Web Client
  element-web:
    image: vectorim/element-web:latest
    container_name: matrix-element-web
    ports:
      - "${ELEMENT_PORT:-8080}:80"
    networks:
      - matrix-net
    depends_on:
      - dendrite
    volumes:
      - ./config/element-config.json:/app/config.json:ro
    restart: unless-stopped

networks:
  matrix-net:
    driver: bridge
